name: Android CI

on:
  workflow_dispatch

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: set up JDK 21
      uses: actions/setup-java@v5
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode Keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      # secrets 上下文不能用在 step 的 if: 里，只能在 shell 内部判空
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore
        else
          echo "KEYSTORE_BASE64 is empty — skipping keystore decode, build will use debug signing"
        fi

    - name: Update Lint Baseline
      run: ./gradlew updateLintBaseline

    - name: Build Release APK
      run: ./gradlew assembleRelease
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    - name: Upload APK
      uses: actions/upload-artifact@v7
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release.apk
